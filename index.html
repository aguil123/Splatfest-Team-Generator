<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splatfest Team Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <div class="card">
          <!-- Header content and splatoon 3 logo-->
        <header>
            <div>
                <img src = "imgs/Splatoon 3 logo.png" alt= "Splatoon 3 Logo"/>
                <!--Main heading-->
                <h1>
                  Splatfest Team Generator
                </h1>
                
                <!--Subheading/Description-->
                <p>
                  Click the button below to generate a team to join!
                </p>
                <button id="team-generator">Choose My Team!</button>

            </div>
        </header>
    </div>
    <!--Team showcase-->
    <section>
      <div class="Allteams">
        <div class="Teampics">
          <img id="teams-image" src = "imgs/All teams.png" alt ="Team Speed, Team Power, Team Tactics"/>

        </div>
        
      </div>
      <!--Team speed-->
      <div class="Team-speed">
        <div class="pics">
          <img id="speed-image" src = "imgs/speed.png" alt ="Team Speed"/>
        </div>

        </div>
      <!--Team power-->
      <div class="Team-power">
        <div class="pics">
          <img id="power-image" src = "imgs/power.png" alt ="Team Power"/>
        </div>
      </div>
      <!--Team tactics-->
      <div class="Team-tactics">
        <div class="pics">
          <img id="tactics-image" src = "imgs/tactics.png" alt ="Team Tactics"/>
        </div>
      </div>
      

    </section>
    <script src="script.js"></script>
  </body>
  
</html>
